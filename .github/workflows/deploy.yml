name: Deploy

on:
  push:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: go vet
        run: go vet ./...
      - name: go test
        # Без Postgres интеграционные тесты корректно скипаются —
        # здесь ловим компиляцию тестов и юнит-логику.
        run: go test ./...

  deploy:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/workout-tracker
            git pull
            docker compose up --build -d
