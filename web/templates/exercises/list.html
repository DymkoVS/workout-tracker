{{define "title"}}Упражнения{{end}}

{{define "content"}}

<div style="padding:56px 24px 24px;border-bottom:1px solid #E0DDD8;display:flex;align-items:flex-end;justify-content:space-between">
  <div>
    <a href="/profile" style="display:inline-flex;align-items:center;gap:6px;color:#6B6560;text-decoration:none;margin-bottom:10px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      <span style="font-family:'Space Grotesk',system-ui;font-size:11px;letter-spacing:1.4px;text-transform:uppercase">ПРОФИЛЬ</span>
    </a>
    <div class="eyebrow eyebrow-dim2" style="margin-bottom:8px">СПРАВОЧНИК</div>
    <div class="font-display" style="font-size:40px;line-height:1;letter-spacing:0.5px">УПРАЖНЕНИЯ</div>
  </div>
  <a href="/exercises/new"
    style="width:44px;height:44px;background:#D7FF1A;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:4px">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </a>
</div>

{{if .Exercises}}
<div style="padding:20px 24px 0;display:flex;flex-direction:column;gap:10px">
  {{range .Exercises}}
  <div style="background:#FFFFFF;border:1px solid #E0DDD8;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;gap:16px">
    <div style="min-width:0">
      <div class="font-display" style="font-size:18px;letter-spacing:0.5px">{{toUpper .Name}}</div>
      {{if .MuscleGroup}}
      <div style="font-family:'Space Grotesk',system-ui;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#9E9893;margin-top:3px">{{.MuscleGroup}}</div>
      {{end}}
    </div>
    <a href="/exercises/{{.ID}}/edit"
      style="font-family:'Space Grotesk',system-ui;font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:#6B6560;white-space:nowrap;flex-shrink:0">
      ИЗМЕНИТЬ
    </a>
  </div>
  {{end}}
</div>
{{else}}
<div style="padding:80px 24px;text-align:center">
  <div class="font-display" style="font-size:22px;letter-spacing:0.5px;color:#9E9893;margin-bottom:16px">УПРАЖНЕНИЙ ЕЩЁ НЕТ</div>
  <a href="/exercises/new"
    style="display:inline-block;background:#D7FF1A;color:#000;font-family:'Anton',Impact,sans-serif;font-size:14px;letter-spacing:2px;padding:14px 28px;text-decoration:none">
    + ДОБАВИТЬ УПРАЖНЕНИЕ
  </a>
</div>
{{end}}

<div style="height:40px"></div>
{{end}}
