{{define "title"}}{{if .Gym}}Редактировать зал{{else}}Новый зал{{end}}{{end}}

{{define "content"}}
{{$g := .Gym}}
<div class="flex items-center gap-3 mb-6">
  <a href="/gyms" class="text-gray-400 hover:text-gray-600">← Назад</a>
  <h1 class="text-2xl font-bold text-gray-800">
    {{if $g}}Редактировать зал{{else}}Новый зал{{end}}
  </h1>
</div>

{{if .Error}}
<div class="mb-4 p-3 rounded-lg bg-red-50 text-red-700 text-sm">{{.Error}}</div>
{{end}}

<form method="POST"
  action="{{if $g}}/gyms/{{$g.ID}}{{else}}/gyms{{end}}"
  class="space-y-5">

  <div class="bg-white rounded-2xl shadow-sm p-5">
    <label class="block text-sm font-medium text-gray-700 mb-1">Название зала</label>
    <input type="text" name="name" required
      value="{{if $g}}{{$g.Name}}{{else if .Name}}{{.Name}}{{end}}"
      placeholder="Например: FitLife, Основной зал"
      class="w-full border border-gray-300 rounded-lg px-3 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
  </div>

  <button type="submit"
    class="w-full bg-blue-600 text-white rounded-xl py-4 font-semibold text-base hover:bg-blue-700 active:bg-blue-800 transition">
    {{if $g}}Сохранить изменения{{else}}Добавить зал{{end}}
  </button>
</form>
{{end}}
