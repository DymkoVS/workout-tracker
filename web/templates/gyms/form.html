{{define "title"}}{{if .Gym}}Редактировать зал{{else}}Новый зал{{end}}{{end}}

{{define "tabbar"}}{{end}}

{{define "head_extra"}}
<style>
.dk-input{width:100%;background:#F5F4F0;border:1px solid #E0DDD8;color:#111110;font-family:'Space Grotesk',system-ui;font-size:15px;padding:12px 14px;outline:none;-webkit-appearance:none;appearance:none;border-radius:0;display:block}
.dk-input:focus{border-color:#7A9200}
.dk-input::placeholder{color:#9E9893}
</style>
{{end}}

{{define "content"}}
{{$g := .Gym}}

<div style="display:flex;align-items:center;justify-content:space-between;padding:56px 20px 16px;border-bottom:1px solid #E0DDD8">
  <a href="/gyms" style="display:flex;align-items:center;gap:8px;color:#6B6560;text-decoration:none">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    <span style="font-family:'Space Grotesk',system-ui;font-size:11px;letter-spacing:1.4px;text-transform:uppercase">ЗАЛЫ</span>
  </a>
  <div class="font-display" style="font-size:13px;letter-spacing:1.5px;color:#6B6560">
    {{if $g}}РЕДАКТИРОВАТЬ{{else}}НОВЫЙ ЗАЛ{{end}}
  </div>
</div>

{{if .Error}}
<div style="margin:16px 24px 0;padding:12px 16px;border-left:3px solid #ff453a;background:#FFFFFF;font-size:13px;color:#ff453a">{{.Error}}</div>
{{end}}

<form method="POST"
  action="{{if $g}}/gyms/{{$g.ID}}{{else}}/gyms{{end}}"
  style="padding:20px 24px 0">

  <div style="margin-bottom:20px">
    <div class="eyebrow eyebrow-dim2" style="margin-bottom:8px">НАЗВАНИЕ ЗАЛА</div>
    <input type="text" name="name" required
      value="{{if $g}}{{$g.Name}}{{else if .Name}}{{.Name}}{{end}}"
      placeholder="FitLife, Основной зал…"
      class="dk-input">
  </div>

  <button type="submit"
    style="width:100%;background:#D7FF1A;color:#000;border:none;font-family:'Anton',Impact,sans-serif;font-size:22px;letter-spacing:2px;padding:20px;cursor:pointer;margin-bottom:32px">
    {{if $g}}СОХРАНИТЬ ИЗМЕНЕНИЯ{{else}}ДОБАВИТЬ ЗАЛ{{end}}
  </button>

</form>
{{end}}
