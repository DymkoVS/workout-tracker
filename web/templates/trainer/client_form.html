{{define "title"}}Новый клиент{{end}}

{{define "tabbar"}}{{end}}

{{define "head_extra"}}
<style>
.dk-input{width:100%;background:#F5F4F0;border:1px solid #E0DDD8;color:#111110;font-family:'Space Grotesk',system-ui;font-size:15px;padding:12px 14px;outline:none;-webkit-appearance:none;appearance:none;border-radius:0;display:block}
.dk-input:focus{border-color:#7A9200}
.dk-input::placeholder{color:#9E9893}
</style>
{{end}}

{{define "content"}}

<div style="display:flex;align-items:center;justify-content:space-between;padding:56px 20px 16px;border-bottom:1px solid #E0DDD8">
  <a href="/trainer/clients" style="display:flex;align-items:center;gap:8px;color:#6B6560;text-decoration:none">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    <span style="font-family:'Space Grotesk',system-ui;font-size:11px;letter-spacing:1.4px;text-transform:uppercase">КЛИЕНТЫ</span>
  </a>
  <div class="font-display" style="font-size:13px;letter-spacing:1.5px;color:#6B6560">НОВЫЙ КЛИЕНТ</div>
</div>

{{if .Error}}
<div style="margin:16px 24px 0;padding:12px 16px;border-left:3px solid #ff453a;background:#FFFFFF;font-size:13px;color:#ff453a">{{.Error}}</div>
{{end}}

<form method="POST" action="/trainer/clients" style="padding:20px 24px 0">

  <div style="margin-bottom:12px">
    <div class="eyebrow eyebrow-dim2" style="margin-bottom:8px">ПОЛНОЕ ИМЯ</div>
    <input type="text" name="full_name"
      value="{{if .Input}}{{.Input.FullName}}{{end}}"
      placeholder="Иван Иванов"
      class="dk-input">
  </div>

  <div style="margin-bottom:12px">
    <div class="eyebrow eyebrow-dim2" style="margin-bottom:8px">ЛОГИН <span style="color:#7A9200">*</span></div>
    <input type="text" name="login" required autocapitalize="none" autocorrect="off"
      value="{{if .Input}}{{.Input.Login}}{{end}}"
      placeholder="ivan"
      class="dk-input">
  </div>

  <div style="margin-bottom:20px">
    <div class="eyebrow eyebrow-dim2" style="margin-bottom:8px">ПАРОЛЬ <span style="color:#7A9200">*</span></div>
    <input type="text" name="password" required minlength="6" autocapitalize="none" autocorrect="off"
      placeholder="минимум 6 символов"
      class="dk-input">
    <div style="font-size:12px;color:#9E9893;margin-top:8px;line-height:1.5">
      Передайте логин и пароль клиенту — он сможет сменить пароль в своём профиле.
    </div>
  </div>

  <div style="display:flex;gap:12px;margin-bottom:32px">
    <button type="submit"
      style="flex:1;background:#D7FF1A;color:#000;border:none;font-family:'Anton',Impact,sans-serif;font-size:20px;letter-spacing:2px;padding:18px;cursor:pointer">
      ДОБАВИТЬ
    </button>
    <a href="/trainer/clients"
      style="padding:18px 20px;border:1px solid #E0DDD8;color:#6B6560;font-family:'Space Grotesk',system-ui;font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;display:flex;align-items:center">
      ОТМЕНА
    </a>
  </div>

</form>
{{end}}
