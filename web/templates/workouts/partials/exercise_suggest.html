{{define "exercise_suggest.html"}}
{{range .Names}}
<button type="button"
  onclick="exSuggestPick(this)"
  style="display:block;width:100%;text-align:left;background:#FFFFFF;border:none;border-bottom:1px solid #E9E8E4;padding:10px 12px;cursor:pointer;font-family:'Anton',Impact,sans-serif;font-size:15px;letter-spacing:0.5px;color:#111110;text-transform:uppercase"
  onmouseenter="this.style.background='#F5F4F0'"
  onmouseleave="this.style.background='#FFFFFF'">{{.}}</button>
{{end}}
{{end}}
