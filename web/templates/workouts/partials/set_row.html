{{define "set_row.html"}}
{{/* Единственный источник разметки строки подхода. .Set необязателен:
     пустой (HTMX add-set) → без значений; с .Set → заполненные значения. */}}
<div class="set-row">
  <span class="set-num">{{add .SetIdx 1}}</span>
  <input type="number" step="0.5" min="0"
    name="exercises[{{.ExIdx}}][sets][{{.SetIdx}}][weight]"
    value="{{if .Set}}{{if .Set.Weight}}{{printf "%.4g" (derefF .Set.Weight)}}{{end}}{{end}}"
    placeholder="кг" class="dk-num">
  <span class="set-x">×</span>
  <input type="number" min="1"
    name="exercises[{{.ExIdx}}][sets][{{.SetIdx}}][reps]"
    value="{{if .Set}}{{if .Set.Reps}}{{derefI .Set.Reps}}{{end}}{{end}}"
    placeholder="—" class="dk-num">
  <input type="number" step="0.5" min="1" max="10"
    name="exercises[{{.ExIdx}}][sets][{{.SetIdx}}][rpe]"
    value="{{if .Set}}{{if .Set.RPE}}{{printf "%.3g" (derefF .Set.RPE)}}{{end}}{{end}}"
    placeholder="—" class="dk-num">
  <button type="button" onclick="removeSet(this)" class="row-del" aria-label="Удалить подход">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
  </button>
</div>
{{end}}
