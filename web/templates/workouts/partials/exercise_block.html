{{define "exercise_block"}}
<div class="exercise-block" style="background:#141414;border:1px solid #2e2e2e">

  {{/* Exercise name + delete */}}
  <div style="padding:12px 14px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #1f1f1f">
    <input type="text"
      name="exercises[{{.ExIdx}}][name]"
      value="{{if .Ex}}{{.Ex.Name}}{{end}}"
      placeholder="НАЗВАНИЕ УПРАЖНЕНИЯ"
      class="dk-input"
      style="font-family:'Anton',Impact,sans-serif;font-size:17px;letter-spacing:0.5px;text-transform:uppercase;padding:8px 10px">
    <button type="button" onclick="this.closest('.exercise-block').remove()"
      style="flex-shrink:0;background:none;border:none;padding:4px;cursor:pointer;color:#6a6a6a;line-height:1">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  {{/* Column headers */}}
  <div style="display:grid;grid-template-columns:22px 1fr 14px 1fr 1fr 28px;gap:4px;padding:8px 14px 2px;align-items:center">
    <span></span>
    <span class="eyebrow eyebrow-dim2" style="text-align:center">ВЕС</span>
    <span></span>
    <span class="eyebrow eyebrow-dim2" style="text-align:center">ПОВТ</span>
    <span class="eyebrow eyebrow-dim2" style="text-align:center">RPE</span>
    <span></span>
  </div>

  {{/* Sets */}}
  <div id="sets-{{.ExIdx}}" class="sets-list" style="padding:0 14px 4px;display:flex;flex-direction:column;gap:4px">
    {{if .Ex}}
    {{range $si, $s := .Ex.Sets}}
    <div class="set-row" style="display:grid;grid-template-columns:22px 1fr 14px 1fr 1fr 28px;gap:4px;align-items:center">
      <span style="font-family:'JetBrains Mono',ui-monospace;font-size:11px;color:#6a6a6a;text-align:right">{{add $si 1}}</span>
      <input type="number" step="0.5" min="0"
        name="exercises[{{$.ExIdx}}][sets][{{$si}}][weight]"
        value="{{if $s.Weight}}{{printf "%.4g" (derefF $s.Weight)}}{{end}}"
        placeholder="кг" class="dk-num">
      <span style="text-align:center;color:#6a6a6a;font-size:12px;font-family:'JetBrains Mono',ui-monospace">×</span>
      <input type="number" min="1"
        name="exercises[{{$.ExIdx}}][sets][{{$si}}][reps]"
        value="{{if $s.Reps}}{{derefI $s.Reps}}{{end}}"
        placeholder="—" class="dk-num">
      <input type="number" step="0.5" min="1" max="10"
        name="exercises[{{$.ExIdx}}][sets][{{$si}}][rpe]"
        value="{{if $s.RPE}}{{printf "%.3g" (derefF $s.RPE)}}{{end}}"
        placeholder="—" class="dk-num">
      <button type="button" onclick="this.closest('.set-row').remove()"
        style="background:none;border:none;padding:4px;cursor:pointer;color:#6a6a6a;text-align:right;line-height:1">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    {{end}}
    {{end}}
  </div>

  {{/* Add set + notes */}}
  <div style="padding:8px 14px;border-top:1px solid #1f1f1f;display:flex;align-items:center;justify-content:space-between">
    <button type="button"
      hx-get="/workouts/htmx/add-set?ex_idx={{.ExIdx}}&set_idx={{if .Ex}}{{len .Ex.Sets}}{{else}}0{{end}}"
      hx-target="previous .sets-list"
      hx-swap="beforeend"
      style="background:none;border:none;padding:0;cursor:pointer;font-family:'Space Grotesk',system-ui;font-size:10px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:#D7FF1A">
      + ПОДХОД
    </button>
  </div>

  <div style="padding:0 14px 12px">
    <input type="text"
      name="exercises[{{.ExIdx}}][notes]"
      value="{{if .Ex}}{{.Ex.Notes}}{{end}}"
      placeholder="Заметка к упражнению"
      class="dk-input"
      style="font-size:12px;color:#9a9a9a;padding:8px 10px">
  </div>

</div>
{{end}}
