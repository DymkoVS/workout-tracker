{{define "title"}}Вход{{end}}

{{define "content"}}
<div class="min-h-screen flex items-center justify-center -mt-6">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Вход в систему</h1>

    {{if .Error}}
    <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-700 text-sm">
      {{if eq .Error "invalid"}}Неверный логин или пароль{{end}}
      {{if eq .Error "inactive"}}Аккаунт деактивирован{{end}}
    </div>
    {{end}}

    <form method="POST" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Логин</label>
        <input type="text" name="login" required autofocus
          class="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit"
        class="w-full bg-blue-600 text-white rounded-lg py-3 font-semibold text-base hover:bg-blue-700 active:bg-blue-800 transition">
        Войти
      </button>
    </form>
  </div>
</div>
{{end}}
