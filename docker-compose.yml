services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: workout_tracker
      POSTGRES_USER: workout
      POSTGRES_PASSWORD: workout_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workout -d workout_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://workout:workout_secret@db:5432/workout_tracker?sslmode=disable
      LISTEN_ADDR: :8080
      SESSION_SECRET: change-me-in-production-32-chars!!
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./web:/app/web
      - ./uploads:/app/uploads

volumes:
  pgdata:
